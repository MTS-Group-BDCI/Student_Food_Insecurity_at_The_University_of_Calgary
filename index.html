<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Student Experiences with Food Insecurity at the UofC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body { 
            height: 100%; 
            font-family: Arial, sans-serif;
        }

        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            padding: 40px 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 32px;
            text-align: center;
            color: #333;
        }

        .carousel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        .student-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border: 2px solid #e0e0e0;
            text-align: center;
        }

        .student-name {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .student-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .metrics-preview {
            display: flex;
            justify-content: space-around;
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .metric-mini {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .metric-mini-icon {
            font-size: 16px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .nav-btn {
            background: #6b6b6b;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .nav-btn:hover {
            background: #555;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .enter-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .enter-btn:hover {
            background: #45a049;
        }

        .enter-btn:active {
            transform: scale(0.95);
        }

        /* Biography and Research links fixed at left bottom */
        .corner-links {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .corner-links a {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #000;
            border: 1px solid rgba(0,0,0,0.08);
            font-size: 13px;
            transition: background 0.3s;
        }

        .corner-links a:hover {
            background: #e0e0e0;
        }

        .page-indicator {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        @media (max-width: 520px) {
            h1 { font-size: 24px; }
            .student-card { padding: 24px; }
            .student-name { font-size: 28px; }
            .nav-buttons { flex-direction: column; }
            .nav-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Experiences with Food Insecurity at the UofC</h1>

        <div class="carousel">
            <div class="student-card">
                <div class="student-name" id="studentName">Marlon</div>
                <div class="student-info">Biology Major, 3rd Year</div>
                
                <div class="metrics-preview">
                    <div class="metric-mini">
                        <div>Happiness</div>
                        <div class="metric-mini-icon">😊</div>
                    </div>
                    <div class="metric-mini">
                        <div>GPA</div>
                        <div>3.5</div>
                    </div>
                    <div class="metric-mini">
                        <div>Bank Account</div>
                        <div>$500</div>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button class="nav-btn" onclick="previousStudent()">← Previous</button>
                    <a class="enter-btn" id="enterBtn" href="marlon.html" style="text-decoration: none; display: inline-block;">Enter Game</a>
                    <button class="nav-btn" onclick="nextStudent()">Next →</button>
                </div>

                <div class="page-indicator" id="pageIndicator">1 / 3</div>
            </div>
        </div>
    </div>

    <div class="corner-links">
        <a href="biography.html">Biography</a>
        <a href="research.html">Our Research</a>
    </div>

    <script>
        const students = [
            { name: 'Marlon', file: 'marlon.html', description: 'Biology Major, 3rd Year' },
            { name: 'Jaspreet', file: 'jaspreet.html', description: 'Computer Science Major, 2nd Year' },
            { name: 'Sofia', file: 'sofia.html', description: 'Philosophy Major, 4th Year' }
        ];

        let currentIndex = 0;

        function updateDisplay() {
            const student = students[currentIndex];
            document.getElementById('studentName').textContent = student.name;
            document.getElementById('enterBtn').href = student.file;
            document.getElementById('pageIndicator').textContent = `${currentIndex + 1} / ${students.length}`;
        }

        function nextStudent() {
            currentIndex = (currentIndex + 1) % students.length;
            updateDisplay();
        }

        function previousStudent() {
            currentIndex = (currentIndex - 1 + students.length) % students.length;
            updateDisplay();
        }
    </script>

</body>
</html>
