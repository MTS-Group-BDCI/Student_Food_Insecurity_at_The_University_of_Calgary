<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ben — Student Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      flex: 1;
    }

    .back-link {
      background: #333;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      border: 1px solid rgba(0,0,0,0.2);
      transition: background 0.3s;
    }

    .back-link:hover {
      background: #555;
    }

    .metrics-bar {
      display: flex;
      justify-content: space-around;
      background: white;
      border-radius: 8px;
      padding: 8px 24px;
      width: 100%;
      max-width: 800px;
      height: 30px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
      align-items: center;
    }

    .metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .metric-label {
      font-size: 12px;
      color: #666;
      font-weight: bold;
      text-transform: uppercase;
    }

    .metric-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      min-width: 40px;
      text-align: center;
    }

    .metric-icon {
      font-size: 20px;
    }

    .main-interface {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 18px;
    }

    .game-interface {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border: 2px solid #e0e0e0;
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .visual-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-rect {
      width: 100%;
      height: 100%;
      background: #f0f0f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #333;
      padding: 20px;
      text-align: center;
    }

    .button-area {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
      padding: 20px;
    }

    .action-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .action-btn:hover {
      opacity: 0.8;
    }

    #continueBtn {
      background: #4CAF50;
      color: white;
    }

    #choiceA, #choiceB {
      background: #2196F3;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ben</h1>
    <a class="back-link" href="index.html">Back</a>
  </div>

  <div class="metrics-bar">
    <div class="metric">
      <div class="metric-label">Happiness</div>
      <div class="metric-icon">😊</div>
      <div class="metric-value">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">GPA</div>
      <div class="metric-value">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Bank Account</div>
      <div class="metric-value">—</div>
    </div>
  </div>

  <div class="main-interface">
    <p>Game Interface</p>
  </div>

  <div class="game-interface">
    <div class="visual-area">
      <div class="visual-rect" id="visual">Initial Visual</div>
    </div>
    <div class="button-area">
    </div>
  </div>

  <script>
    const types = {
      A: { visual: "Situation: You have limited funds for food this month.", button: "Continue" },
      B: { visual: "Problem: Do you cut back on food or essentials?", buttons: ["Food", "Essentials"] },
      C: { visual: "Context: International fees and family support create financial strain.", button: "Continue" }
    };

    function showRandomType() {
      const typeKeys = Object.keys(types);
      const randomType = typeKeys[Math.floor(Math.random() * typeKeys.length)];
      const type = types[randomType];
      document.getElementById('visual').textContent = type.visual;
      
      const buttonArea = document.querySelector('.button-area');
      buttonArea.innerHTML = '';
      
      if (type.button) {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        btn.textContent = type.button;
        btn.addEventListener('click', showRandomType);
        buttonArea.appendChild(btn);
      } else if (type.buttons) {
        type.buttons.forEach(text => {
          const btn = document.createElement('button');
          btn.className = 'action-btn';
          btn.textContent = text;
          btn.addEventListener('click', showRandomType);
          buttonArea.appendChild(btn);
        });
      }
    }

    // Initial
    showRandomType();
  </script>

</body>
</html>
