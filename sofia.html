      border: 1px solid #ddd;
      align-items: center;
    }

    .metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .metric-label {
      font-size: 12px;
      color: #666;
      font-weight: bold;
      text-transform: uppercase;
    }

    .metric-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      min-width: 40px;
      text-align: center;
    }

    .metric-icon {
      font-size: 20px;

  <div class="game-interface">

  <script>
    const visuals = [
      "You wake up early for your commute from Okotoks to campus.",
      "Traffic is heavy, and you're running late for class.",
      "You skip breakfast to save time, feeling hungry already.",
      "In class, you struggle to focus due to fatigue from your schedule.",
      "You work a part-time shift after classes, delaying dinner.",
      "The day ends with you exhausted, having eaten only convenience food."
    ];

    let currentVisualIndex = 0;

    function updateVisual() {
      document.getElementById('visual').textContent = visuals[currentVisualIndex];
      currentVisualIndex = (currentVisualIndex + 1) % visuals.length;
    }

    function showContinue() {
      document.getElementById('continueBtn').classList.remove('hidden');
      document.getElementById('choiceA').classList.add('hidden');
      document.getElementById('choiceB').classList.add('hidden');
    }

    function showChoices() {
      document.getElementById('continueBtn').classList.add('hidden');
      document.getElementById('choiceA').classList.remove('hidden');
      document.getElementById('choiceB').classList.remove('hidden');
    }

    document.getElementById('continueBtn').addEventListener('click', () => {
      updateVisual();
      if (Math.random() > 0.5) {
        showContinue();
      } else {
        showChoices();
      }
    });

    document.getElementById('choiceA').addEventListener('click', () => {
      updateVisual();
      if (Math.random() > 0.5) {
        showContinue();
      } else {
        showChoices();
      }
    });

    document.getElementById('choiceB').addEventListener('click', () => {
      updateVisual();
      if (Math.random() > 0.5) {
        showContinue();
      } else {
        showChoices();
      }
    });

    // Initial state
    showContinue();
  </script>
