<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Marlon — Student Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      flex: 1;
    }

    .back-link {
      background: #6b6b6b;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      border: 1px solid rgba(0,0,0,0.2);
      transition: background 0.3s;
    }

    .back-link:hover {
      background: #555;
    }

    .metrics-bar {
      display: flex;
      justify-content: space-around;
      background: white;
      border-radius: 8px;
      padding: 16px 24px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
    }

    .metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .metric-label {
      font-size: 12px;
      color: #666;
      font-weight: bold;
      text-transform: uppercase;
    }

    .metric-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      min-width: 40px;
      text-align: center;
    }

    .metric-icon {
      font-size: 20px;
    }

    .main-interface {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Marlon</h1>
    <a class="back-link" href="index.html">Back</a>
  </div>

  <div class="metrics-bar">
    <div class="metric">
      <div class="metric-label">Happiness</div>
      <div class="metric-icon">😊</div>
      <div class="metric-value">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">GPA</div>
      <div class="metric-value">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Bank Account</div>
      <div class="metric-value">—</div>
    </div>
  </div>

  <div class="main-interface">
    <p>Game Interface</p>
  </div>
</body>
</html>
